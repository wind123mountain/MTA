# Model arguments
model_name_or_path: facebook/opt-1.3b
ref_model_name_or_path: MiniLLM/SFT-OPT-6.7B
torch_dtype: bfloat16
# attn_implementation: sdpa

# LoRA arguments
use_peft: true
lora_r: 16
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules:
- q_proj
- k_proj
- v_proj
- o_proj
- gate_proj
- up_proj
- down_proj

# Data training arguments
dataset_mixer:
  distillm-2-master/data/reformatted/opt: 1.0
dataset_splits:
- train
- test
preprocessing_num_workers: 12

# DistiLLMTrainer arugments
bf16: true
do_eval: true
eval_steps: 10000000
gradient_accumulation_steps: 2
gradient_checkpointing: false
gradient_checkpointing_kwargs:
  use_reentrant: False
hub_model_id: opt
learning_rate: 1.0e-4
log_level: info
logging_steps: 100
lr_scheduler_type: cosine
max_length: 256
max_prompt_length: 128
num_train_epochs: 3
optim: adamw_torch
output_dir: ./distillm-2-master/outputs/opt-1.3b-distillm2
run_name: opt-1.3b-distillm2
per_device_train_batch_size: 4
per_device_eval_batch_size: 16
push_to_hub: false
# save_strategy: "steps"
# save_steps: 200
# save_total_limit: 20
save_strategy: "epoch"
save_total_limit: 5 
save_only_model: true
seed: 42
warmup_ratio: 0.1
loss_type: distillm_v2